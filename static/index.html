<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-panel {
            background-color: white;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            background-color: white;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .chat-input {
            display: flex;
            padding: 10px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        }
        input[type="text"], input[type="password"], select, textarea {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            width: 100%;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            max-width: 80%;
        }
        .user-message {
            background-color: #3498db;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .bot-message {
            background-color: #f1f1f1;
            align-self: flex-start;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background-color: #ddd;
            border: none;
            cursor: pointer;
        }
        .tab.active {
            background-color: #3498db;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .provider-toggle {
            display: flex;
            margin: 10px 0;
        }
        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            background-color: #ddd;
            cursor: pointer;
        }
        .toggle-btn.active {
            background-color: #3498db;
            color: white;
        }
        #status-indicator {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            background-color: #f1f1f1;
        }
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>IT Support Chatbot & Ticket Resolver</h1>
    </header>

    <div class="container">
        <div class="config-panel">
            <h2>LLM Provider Configuration</h2>

            <div class="provider-toggle">
                <div class="toggle-btn active" id="ollama-toggle" onclick="toggleProvider('ollama')">Ollama (Local)</div>
                <div class="toggle-btn" id="openai-toggle" onclick="toggleProvider('openai')">OpenAI (API)</div>
            </div>

            <div id="openai-config" style="display: none;">
                <div>
                    <label for="api-key">OpenAI API Key:</label>
                    <input type="password" id="api-key" placeholder="Enter your OpenAI API key">
                </div>
                <div>
                    <label for="model-select">Model:</label>
                    <select id="model-select">
                        <option value="gpt-4">GPT-4</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </select>
                </div>
                <button onclick="saveApiKey()">Save & Connect</button>
            </div>

            <div id="status-indicator">
                Current Provider: <span id="current-provider">Ollama (Local)</span><br>
                Model: <span id="current-model">llama3</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'chat-tab')">Chat</button>
            <button class="tab" onclick="openTab(event, 'ticket-tab')">Create Ticket</button>
        </div>

        <div id="chat-tab" class="tab-content active">
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message bot-message">Hello! I'm your IT support assistant. How can I help you today?</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="user-input" placeholder="Type your IT question here..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <div id="ticket-tab" class="tab-content">
            <div class="config-panel">
                <h2>Create Support Ticket</h2>
                <div>
                    <label for="ticket-id">Ticket ID (optional, for IIQ integration):</label>
                    <input type="text" id="ticket-id" placeholder="e.g. IIQ-12345">
                </div>
                <div>
                    <label for="ticket-title">Title:</label>
                    <input type="text" id="ticket-title" placeholder="Brief description of the issue">
                </div>
                <div>
                    <label for="ticket-description">Description:</label>
                    <textarea id="ticket-description" rows="5" placeholder="Detailed description of your issue..."></textarea>
                </div>
                <button id="submit-ticket-btn" onclick="createTicket()">Submit Ticket</button>
                <div id="ticket-result" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab functionality
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].className = tabcontent[i].className.replace(" active", "");
            }
            tablinks = document.getElementsByClassName("tab");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).className += " active";
            evt.currentTarget.className += " active";
        }

        // Provider toggle
        function toggleProvider(provider) {
            if (provider === 'openai') {
                document.getElementById('openai-config').style.display = 'block';
                document.getElementById('openai-toggle').classList.add('active');
                document.getElementById('ollama-toggle').classList.remove('active');
            } else {
                document.getElementById('openai-config').style.display = 'none';
                document.getElementById('ollama-toggle').classList.add('active');
                document.getElementById('openai-toggle').classList.remove('active');
                // Switch back to Ollama
                switchProvider('ollama');
            }
        }

        // Save API key and switch to OpenAI
        function saveApiKey() {
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;

            if (!apiKey) {
                alert('Please enter your OpenAI API key');
                return;
            }

            if (apiKey.length < 10) {
                alert('API key appears too short. Please enter a valid OpenAI API key.');
                return;
            }

            switchProvider('openai', apiKey, model);
        }

        // Switch LLM provider
        async function switchProvider(provider, apiKey = null, modelName = null) {
            try {
                const response = await fetch('/switch_provider', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        provider: provider,
                        api_key: apiKey,
                        model_name: modelName
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('current-provider').textContent =
                        provider === 'openai' ? 'OpenAI (API)' : 'Ollama (Local)';
                    document.getElementById('current-model').textContent = data.model;

                    // Add success message
                    const messages = document.getElementById('chat-messages');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message bot-message';
                    messageDiv.textContent = 'Switched to ' + provider + ' provider using model ' + data.model;
                    messages.appendChild(messageDiv);
                    messages.scrollTop = messages.scrollHeight;
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to switch provider. See console for details.');
            }
        }

        // Send message
        async function sendMessage() {
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const message = userInput.value.trim();

            if (!message) return;

            // Disable input while processing
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message to chat
            const messages = document.getElementById('chat-messages');
            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'message user-message';
            userMessageDiv.textContent = message;
            messages.appendChild(userMessageDiv);

            // Clear input
            userInput.value = '';

            // Show loading message with spinner
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.innerHTML = '<span class="spinner"></span><span class="loading-text">Thinking...</span>';
            messages.appendChild(loadingDiv);
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Replace loading message with actual response
                    loadingDiv.innerHTML = '';
                    loadingDiv.textContent = data.response;
                } else {
                    loadingDiv.innerHTML = '';
                    loadingDiv.textContent = 'Error: ' + (data.detail || 'Unknown error');
                }
                messages.scrollTop = messages.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = '';
                loadingDiv.textContent = 'Sorry, there was an error processing your request.';
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Create ticket
        async function createTicket() {
            const ticketId = document.getElementById('ticket-id').value.trim();
            const title = document.getElementById('ticket-title').value.trim();
            const description = document.getElementById('ticket-description').value.trim();
            const submitBtn = document.getElementById('submit-ticket-btn');

            if (!description) {
                alert('Please provide a description of the issue');
                return;
            }

            const resultDiv = document.getElementById('ticket-result');
            resultDiv.innerHTML = '<p><span class="spinner"></span><span class="loading-text">Processing ticket...</span></p>';
            submitBtn.disabled = true;

            try {
                // Build request body
                const requestBody = {
                    title: title,
                    description: description
                };
                if (ticketId) {
                    requestBody.ticket_id = ticketId;
                }

                // First categorize the ticket
                const categorizeResponse = await fetch('/categorize_ticket', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const categoryData = await categorizeResponse.json();

                // Then try to auto-resolve
                const resolveResponse = await fetch('/resolve_ticket', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const resolveData = await resolveResponse.json();

                // Extract category info -- handle both nested and flat shapes
                const catInfo = categoryData.category || {};
                const categoryName = catInfo.category || catInfo || 'Unknown';
                const confidence = catInfo.confidence != null ? (catInfo.confidence * 100).toFixed(0) + '%' : 'N/A';
                const method = catInfo.method || '';

                // Display results
                let resultHTML = '<h3>Ticket Analysis Results</h3>';
                resultHTML += '<p><strong>Category:</strong> ' + categoryName + '</p>';
                resultHTML += '<p><strong>Confidence:</strong> ' + confidence + ' (' + method + ')</p>';
                resultHTML += '<p><strong>Auto-resolvable:</strong> ' + (resolveData.auto_resolved ? 'Yes' : 'No') + '</p>';

                if (resolveData.auto_resolved) {
                    resultHTML += '<p><strong>Resolution:</strong> ' + resolveData.resolution + '</p>';
                } else {
                    resultHTML += '<p><strong>Reason:</strong> ' + resolveData.reason + '</p>';
                }

                if (resolveData.iiq_result) {
                    resultHTML += '<p><strong>IIQ Status:</strong> Ticket updated in Incident IQ</p>';
                }

                resultDiv.innerHTML = resultHTML;

            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = '<p>Sorry, there was an error processing your ticket.</p>';
            } finally {
                submitBtn.disabled = false;
            }
        }

        // Check status on load
        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                document.getElementById('current-provider').textContent =
                    data.llm_provider === 'openai' ? 'OpenAI (API)' : 'Ollama (Local)';
                document.getElementById('current-model').textContent = data.llm_model;

                // Update UI to match current provider
                if (data.llm_provider === 'openai') {
                    document.getElementById('openai-toggle').classList.add('active');
                    document.getElementById('ollama-toggle').classList.remove('active');
                    document.getElementById('openai-config').style.display = 'block';
                }
            } catch (error) {
                console.error('Error checking status:', error);
            }
        }

        // Initialize
        window.onload = function() {
            checkStatus();
        };
    </script>
</body>
</html>
