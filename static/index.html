<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-panel {
            background-color: white;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            background-color: white;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .chat-input {
            display: flex;
            padding: 10px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        }
        input[type="text"], input[type="password"], select, textarea {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            width: 100%;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            max-width: 80%;
        }
        .user-message {
            background-color: #3498db;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .bot-message {
            background-color: #f1f1f1;
            align-self: flex-start;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background-color: #ddd;
            border: none;
            cursor: pointer;
        }
        .tab.active {
            background-color: #3498db;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .provider-toggle {
            display: flex;
            margin: 10px 0;
        }
        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            background-color: #ddd;
            cursor: pointer;
        }
        .toggle-btn.active {
            background-color: #3498db;
            color: white;
        }
        #status-indicator {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <header>
        <h1>IT Support Chatbot & Ticket Resolver</h1>
    </header>

    <div class="container">
        <div class="config-panel">
            <h2>LLM Provider Configuration</h2>
            
            <div class="provider-toggle">
                <div class="toggle-btn active" id="ollama-toggle" onclick="toggleProvider('ollama')">Ollama (Local)</div>
                <div class="toggle-btn" id="openai-toggle" onclick="toggleProvider('openai')">OpenAI (API)</div>
            </div>
            
            <div id="openai-config" style="display: none;">
                <div>
                    <label for="api-key">OpenAI API Key:</label>
                    <input type="password" id="api-key" placeholder="Enter your OpenAI API key">
                </div>
                <div>
                    <label for="model-select">Model:</label>
                    <select id="model-select">
                        <option value="gpt-4">GPT-4</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </select>
                </div>
                <button onclick="saveApiKey()">Save & Connect</button>
            </div>
            
            <div id="status-indicator">
                Current Provider: <span id="current-provider">Ollama (Local)</span><br>
                Model: <span id="current-model">llama3</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'chat-tab')">Chat</button>
            <button class="tab" onclick="openTab(event, 'ticket-tab')">Create Ticket</button>
        </div>

        <div id="chat-tab" class="tab-content active">
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message bot-message">Hello! I'm your IT support assistant. How can I help you today?</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="user-input" placeholder="Type your IT question here..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <div id="ticket-tab" class="tab-content">
            <div class="config-panel">
                <h2>Create Support Ticket</h2>
                <div>
                    <label for="ticket-title">Title:</label>
                    <input type="text" id="ticket-title" placeholder="Brief description of the issue">
                </div>
                <div>
                    <label for="ticket-description">Description:</label>
                    <textarea id="ticket-description" rows="5" placeholder="Detailed description of your issue..."></textarea>
                </div>
                <button onclick="createTicket()">Submit Ticket</button>
                <div id="ticket-result" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab functionality
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].className = tabcontent[i].className.replace(" active", "");
            }
            tablinks = document.getElementsByClassName("tab");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).className += " active";
            evt.currentTarget.className += " active";
        }

        // Provider toggle
        function toggleProvider(provider) {
            if (provider === 'openai') {
                document.getElementById('openai-config').style.display = 'block';
                document.getElementById('openai-toggle').classList.add('active');
                document.getElementById('ollama-toggle').classList.remove('active');
            } else {
                document.getElementById('openai-config').style.display = 'none';
                document.getElementById('ollama-toggle').classList.add('active');
                document.getElementById('openai-toggle').classList.remove('active');
                // Switch back to Ollama
                switchProvider('ollama');
            }
        }

        // Save API key and switch to OpenAI
        function saveApiKey() {
            const apiKey = document.getElementById('api-key').value;
            const model = document.getElementById('model-select').value;
            
            if (!apiKey) {
                alert('Please enter your OpenAI API key');
                return;
            }
            
            switchProvider('openai', apiKey, model);
        }

        // Switch LLM provider
        async function switchProvider(provider, apiKey = null, modelName = null) {
            try {
                const response = await fetch('/switch_provider', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        provider: provider,
                        api_key: apiKey,
                        model_name: modelName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('current-provider').textContent = 
                        provider === 'openai' ? 'OpenAI (API)' : 'Ollama (Local)';
                    document.getElementById('current-model').textContent = data.model;
                    
                    // Add success message
                    const messages = document.getElementById('chat-messages');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message bot-message';
                    messageDiv.textContent = `Switched to ${provider} provider using model ${data.model}`;
                    messages.appendChild(messageDiv);
                    messages.scrollTop = messages.scrollHeight;
                } else {
                    alert(`Error: ${data.detail}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to switch provider. See console for details.');
            }
        }

        // Send message
        async function sendMessage() {
            const userInput = document.getElementById('user-input');
            const message = userInput.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            const messages = document.getElementById('chat-messages');
            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'message user-message';
            userMessageDiv.textContent = message;
            messages.appendChild(userMessageDiv);
            
            // Clear input
            userInput.value = '';
            
            // Show loading message
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.textContent = 'Thinking...';
            messages.appendChild(loadingDiv);
            messages.scrollTop = messages.scrollHeight;
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });
                
                const data = await response.json();
                
                // Replace loading message with actual response
                loadingDiv.textContent = data.response;
                messages.scrollTop = messages.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.textContent = 'Sorry, there was an error processing your request.';
            }
        }

        // Create ticket
        async function createTicket() {
            const title = document.getElementById('ticket-title').value.trim();
            const description = document.getElementById('ticket-description').value.trim();
            
            if (!description) {
                alert('Please provide a description of the issue');
                return;
            }
            
            const resultDiv = document.getElementById('ticket-result');
            resultDiv.innerHTML = '<p>Processing ticket...</p>';
            
            try {
                // First categorize the ticket
                const categorizeResponse = await fetch('/categorize_ticket', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        description: description
                    })
                });
                
                const categoryData = await categorizeResponse.json();
                
                // Then try to auto-resolve
                const resolveResponse = await fetch('/resolve_ticket', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        description: description
                    })
                });
                
                const resolveData = await resolveResponse.json();
                
                // Display results
                let resultHTML = `
                    <h3>Ticket Analysis Results</h3>
                    <p><strong>Category:</strong> ${categoryData.category.category}</p>
                    <p><strong>Auto-resolvable:</strong> ${resolveData.auto_resolved ? 'Yes' : 'No'}</p>
                `;
                
                if (resolveData.auto_resolved) {
                    resultHTML += `<p><strong>Resolution:</strong> ${resolveData.resolution}</p>`;
                } else {
                    resultHTML += `<p><strong>Reason:</strong> ${resolveData.reason}</p>`;
                }
                
                resultDiv.innerHTML = resultHTML;
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = '<p>Sorry, there was an error processing your ticket.</p>';
            }
        }

        // Check status on load
        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                document.getElementById('current-provider').textContent = 
                    data.llm_provider === 'openai' ? 'OpenAI (API)' : 'Ollama (Local)';
                document.getElementById('current-model').textContent = data.llm_model;
                
                // Update UI to match current provider
                if (data.llm_provider === 'openai') {
                    document.getElementById('openai-toggle').classList.add('active');
                    document.getElementById('ollama-toggle').classList.remove('active');
                    document.getElementById('openai-config').style.display = 'block';
                }
            } catch (error) {
                console.error('Error checking status:', error);
            }
        }

        // Initialize
        window.onload = function() {
            checkStatus();
        };
    </script>
</body>
</html>
